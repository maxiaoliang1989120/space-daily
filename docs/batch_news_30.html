const batchNews = [...commercialNews, ...lowaltitudeNews, ...remoteIntlNews];

// 标签映射
const tagClassMap = {
    '商业航天': 'commercial', '低空经济': 'lowaltitude', '遥感卫星': 'remote',
    '国际动态': 'international', '政策': 'policy', '融资': 'investment',
    'SpaceX': 'international', '中国航天': 'commercial', '卫星组网': 'commercial'
};

// 自动插入新闻
(function() {
    batchNews.forEach(news => {
        const article = document.createElement('article');
        article.className = 'news-card';
        article.setAttribute('data-id', news.id);
        article.setAttribute('data-category', news.category);
        article.setAttribute('data-date', news.date);
        article.setAttribute('onclick', 'openModal(this)');
        
        const tagsHtml = news.tags.map(tag => {
            const tagClass = tagClassMap[tag] || 'commercial';
            return `<span class="tag ${tagClass}">${tag}</span>`;
        }).join('');
        
        article.innerHTML = `
            <div class="news-image" style="background: ${news.gradient};">
                ${news.icon}
                <span class="news-priority ${news.priority}">${news.priorityText}</span>
                <button class="favorite-btn" onclick="event.stopPropagation(); toggleFavorite('${news.id}')" title="收藏">☆</button>
            </div>
            <div class="news-content">
                <div class="news-meta">${tagsHtml}</div>
                <h3 class="news-title">${news.title}</h3>
                <p class="news-summary">${news.summary}</p>
                <div class="news-footer">
                    <span class="news-source">${news.source}</span>
                    <span>刚刚</span>
                </div>
            </div>
        `;
        
        let targetGrid;
        if (news.category === 'commercial') {
            targetGrid = document.getElementById('commercialGrid');
        } else if (news.category === 'lowaltitude') {
            targetGrid = document.getElementById('lowaltitudeGrid');
        } else if (news.category === 'remote') {
            const remoteSection = document.getElementById('remote');
            if (remoteSection) targetGrid = remoteSection.querySelector('.news-grid');
        }
        
        if (targetGrid) {
            targetGrid.appendChild(article);
        }
    });
    
    // 更新统计数据
    const statValues = document.querySelectorAll('.stat-value');
    if (statValues.length >= 4) {
        statValues[0].textContent = document.querySelectorAll('[data-category="commercial"]').length;
        statValues[1].textContent = document.querySelectorAll('[data-category="lowaltitude"]').length;
        statValues[2].textContent = document.querySelectorAll('[data-category="remote"]').length;
        statValues[3].textContent = document.querySelectorAll('.news-card').length;
    }
    
    console.log('[Space Daily] 已自动补充30条新闻：商业航天10条、低空经济10条、遥感/国际10条');
})();
</script>
